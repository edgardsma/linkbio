# Docker Compose para LinkBio Brasil

version: '3.8'

services:
  # Aplicação Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkbio-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - linkbio-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: linkbio-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - linkbio-network

  # Redis (opcional - para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: linkbio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - linkbio-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  linkbio-network:
    driver: bridge
