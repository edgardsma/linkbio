# Docker Compose para LinkBio Brasil

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: linkbio-db
    environment:
      POSTGRES_USER: linkbio
      POSTGRES_PASSWORD: linkbio_password
      POSTGRES_DB: linkbio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - linkbio-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U linkbio -d linkbio" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (opcional - para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: linkbio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - linkbio-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Aplicação Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkbio-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linkbio-network
    volumes:
      - upload_data:/app/public/uploads

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local

networks:
  linkbio-network:
    driver: bridge
