name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: linkbio
          POSTGRES_PASSWORD: linkbio_password
          POSTGRES_DB: linkbio_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://linkbio:linkbio_password@localhost:5432/linkbio_test

      - name: Run tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://linkbio:linkbio_password@localhost:5432/linkbio_test

      - name: Check test coverage
        run: |
          COVERAGE=$(npm run test:coverage 2>&1 | grep -oP 'All files[^|]*\K\d+' || echo '0')
          if (( $(echo $COVERAGE | cut -d'.' -f1) < 70 )); then
            echo "⚠️ Cobertura de testes abaixo de 70%"
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://linkbio:linkbio_password@localhost:5432/linkbio_test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
