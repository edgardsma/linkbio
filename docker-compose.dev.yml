# Docker Compose para Desenvolvimento - LinkBio Brasil

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: linkbio-db-dev
    environment:
      POSTGRES_USER: linkbio
      POSTGRES_PASSWORD: linkbio_password
      POSTGRES_DB: linkbio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - linkbio-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkbio -d linkbio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (opcional - para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: linkbio-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    restart: unless-stopped
    networks:
      - linkbio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Aplicação Next.js (Modo Desenvolvimento)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: linkbio-app-dev
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - linkbio-network
    volumes:
      # Hot reload para desenvolvimento
      - .:/app
      - /app/node_modules
      - /app/.next
      - upload_data_dev:/app/public/uploads
    environment:
      - NODE_ENV=development
      - NEXT_DISABLE_TURBOPACK=1

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  upload_data_dev:
    driver: local

networks:
  linkbio-network:
    driver: bridge
